name: CI

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          echo "Waiting for server on port 3000..."
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/_next/webpack-hmr >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Run smoke-test runner
        run: |
          node scripts/runAllSmokeTests.js

      - name: Upload smoke logs
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: logs/*.log

      - name: Stop server
        run: |
          pkill -f "next start" || true
